<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MoodWave — Sign In</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;min-height:100vh;overflow-x:hidden;background:#070714;}

/* ── Watercolor blobs ── */
.blob{position:fixed;border-radius:50%;filter:blur(80px);opacity:0.45;pointer-events:none;z-index:0;animation:blobdrift ease-in-out infinite alternate;}
@keyframes blobdrift{from{transform:translate(0,0) scale(1);}to{transform:translate(30px,20px) scale(1.08);}}

/* ── Floating notes ── */
.note{position:fixed;color:rgba(255,255,255,0.12);font-size:20px;pointer-events:none;z-index:1;animation:floatnote linear infinite;}
@keyframes floatnote{0%{transform:translateY(105vh) rotate(0deg);opacity:0;}8%{opacity:0.14;}92%{opacity:0.1;}100%{transform:translateY(-60px) rotate(400deg);opacity:0;}}

/* ── Card ── */
.card{
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,0.13);
  border-radius:24px;
  padding:40px 36px;
  width:100%;max-width:420px;
  position:relative;z-index:10;
}

/* ── Gradient text ── */
.gtext{background:linear-gradient(135deg,#ff6eb4,#a78bfa,#60d9ff,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* ── Tab pill ── */
.tab-wrap{display:flex;background:rgba(255,255,255,0.05);border-radius:14px;padding:4px;margin-bottom:28px;}
.tab-btn{flex:1;padding:9px 0;border:none;border-radius:10px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.25s;}
.tab-btn.on{background:linear-gradient(135deg,#a855f7,#3b82f6);color:#fff;}
.tab-btn.off{background:transparent;color:rgba(255,255,255,0.42);}

/* ── Input ── */
.inp-wrap{position:relative;margin-bottom:14px;}
.inp-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;opacity:0.5;}
.inp{
  width:100%;padding:12px 14px 12px 40px;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.14);
  border-radius:12px;color:#fff;
  font-family:'Poppins',sans-serif;font-size:14px;
  outline:none;transition:border-color 0.2s,background 0.2s;
}
.inp::placeholder{color:rgba(255,255,255,0.3);}
.inp:focus{border-color:rgba(168,85,247,0.75);background:rgba(255,255,255,0.10);}

/* ── Eye toggle ── */
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,0.35);cursor:pointer;font-size:16px;padding:4px;}
.eye-btn:hover{color:rgba(255,255,255,0.65);}

/* ── Strength bar ── */
.str-row{display:flex;gap:4px;margin-top:6px;}
.str-seg{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,0.1);transition:background 0.3s;}

/* ── Rainbow button ── */
.rbtn{
  width:100%;padding:14px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#ff4d8d,#a855f7,#3b82f6,#10b981);
  background-size:250% 250%;animation:gs 3s ease infinite;
  color:#fff;font-family:'Poppins',sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;margin-top:6px;
}
.rbtn:hover{transform:scale(1.02);box-shadow:0 0 28px rgba(168,85,247,0.45);}
.rbtn:active{transform:scale(0.98);}
@keyframes gs{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* ── Divider ── */
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.1);}
.divider span{color:rgba(255,255,255,0.3);font-size:12px;white-space:nowrap;}

/* ── Social button ── */
.sbtn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:12px 14px;border-radius:12px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.82);
  font-family:'Poppins',sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;transition:all 0.2s;margin-bottom:10px;
}
.sbtn:hover{background:rgba(255,255,255,0.11);border-color:rgba(255,255,255,0.22);transform:translateY(-1px);}
.sbtn:last-child{margin-bottom:0;}

/* ── Checkbox ── */
.chk-wrap{display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;}
.chk{width:16px;height:16px;min-width:16px;accent-color:#a855f7;margin-top:2px;cursor:pointer;}

/* ── Link ── */
.lnk{color:#a78bfa;cursor:pointer;text-decoration:none;}
.lnk:hover{text-decoration:underline;}

/* ── Error / success msg ── */
.msg{font-size:12px;padding:10px 14px;border-radius:10px;margin-top:12px;display:none;}
.msg.err{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;}
.msg.ok{background:rgba(52,211,153,0.12);border:1px solid rgba(52,211,153,0.3);color:#6ee7b7;}

/* ── Wave footer ── */
.wave{display:flex;align-items:flex-end;justify-content:center;gap:3px;height:28px;margin-top:24px;}
.wbar{width:4px;border-radius:2px;background:linear-gradient(to top,#a855f7,#60d9ff);animation:wb 0.8s ease-in-out infinite alternate;}
@keyframes wb{from{height:4px}to{height:24px}}

/* ── Forgot overlay (in-flow) ── */
#forgot-view{display:none;}
</style>
</head>
<body>

<!-- Blobs -->
<div class="blob" style="width:500px;height:500px;background:#ff4d8d;top:-150px;left:-150px;animation-duration:8s;"></div>
<div class="blob" style="width:450px;height:450px;background:#3b82f6;top:10%;right:-120px;animation-duration:10s;animation-delay:-3s;"></div>
<div class="blob" style="width:400px;height:400px;background:#a855f7;bottom:5%;left:20%;animation-duration:12s;animation-delay:-5s;"></div>
<div class="blob" style="width:300px;height:300px;background:#10b981;bottom:-80px;right:10%;animation-duration:9s;animation-delay:-2s;"></div>
<div class="blob" style="width:250px;height:250px;background:#f59e0b;top:40%;left:5%;animation-duration:11s;animation-delay:-7s;"></div>

<!-- Notes container -->
<div id="nc" style="position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;"></div>

<!-- ══ Main layout ══ -->
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:5;">
  <div style="display:flex;flex-direction:column;align-items:center;width:100%;">

    <!-- Logo -->
    <div style="text-align:center;margin-bottom:28px;">
      <div style="font-size:44px;margin-bottom:6px;">🎵</div>
      <h1 style="font-size:34px;font-weight:800;" class="gtext">MoodWave</h1>
      <p style="color:rgba(255,255,255,0.4);font-size:13px;margin-top:3px;">Feel the music. Feel the mood.</p>
    </div>

    <div class="card">

      <!-- ══ LOGIN / REGISTER TABS ══ -->
      <div id="auth-tabs" class="tab-wrap">
        <button class="tab-btn on" id="t-login" onclick="switchTab('login')">Sign in</button>
        <button class="tab-btn off" id="t-reg" onclick="switchTab('register')">Create account</button>
      </div>

      <!-- ══ LOGIN FORM ══ -->
      <div id="login-form">
        <div class="inp-wrap">
          <span class="inp-icon">✉</span>
          <input class="inp" id="l-email" type="email" placeholder="Email address" autocomplete="email"/>
        </div>
        <div class="inp-wrap">
          <span class="inp-icon">🔒</span>
          <input class="inp" id="l-pass" type="password" placeholder="Password" autocomplete="current-password"/>
          <button class="eye-btn" type="button" onclick="toggleEye('l-pass',this)">👁</button>
        </div>
        <div style="text-align:right;margin:-4px 0 16px;">
          <span class="lnk" style="font-size:12px;" onclick="showForgot()">Forgot password?</span>
        </div>
        <button class="rbtn" onclick="doLogin()">Sign in →</button>
        <div id="l-msg" class="msg err"></div>

        <div class="divider"><span>or continue with</span></div>

        <!-- Social -->
        <button class="sbtn" onclick="socialLogin('Google')">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>
        <button class="sbtn" onclick="socialLogin('Apple')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          Continue with Apple
        </button>

        <p style="text-align:center;color:rgba(255,255,255,0.3);font-size:12px;margin-top:18px;">
          No account? <span class="lnk" onclick="switchTab('register')">Create one free</span>
        </p>
      </div>

      <!-- ══ REGISTER FORM ══ -->
      <div id="register-form" style="display:none;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
          <div class="inp-wrap" style="margin-bottom:0;">
            <span class="inp-icon">👤</span>
            <input class="inp" id="r-fname" type="text" placeholder="First name" autocomplete="given-name"/>
          </div>
          <div class="inp-wrap" style="margin-bottom:0;">
            <span class="inp-icon" style="left:10px;">👤</span>
            <input class="inp" id="r-lname" type="text" placeholder="Last name" autocomplete="family-name"/>
          </div>
        </div>
        <div class="inp-wrap">
          <span class="inp-icon">✉</span>
          <input class="inp" id="r-email" type="email" placeholder="Email address" autocomplete="email" oninput="checkEmail(this)"/>
        </div>
        <div class="inp-wrap">
          <span class="inp-icon">🔒</span>
          <input class="inp" id="r-pass" type="password" placeholder="Create password" autocomplete="new-password" oninput="checkStrength(this.value)"/>
          <button class="eye-btn" type="button" onclick="toggleEye('r-pass',this)">👁</button>
        </div>
        <!-- Strength -->
        <div class="str-row" id="str-bars">
          <div class="str-seg" id="s1"></div>
          <div class="str-seg" id="s2"></div>
          <div class="str-seg" id="s3"></div>
          <div class="str-seg" id="s4"></div>
        </div>
        <p id="str-label" style="font-size:11px;color:rgba(255,255,255,0.3);margin:4px 0 10px;height:14px;"></p>

        <div class="inp-wrap">
          <span class="inp-icon">🔒</span>
          <input class="inp" id="r-pass2" type="password" placeholder="Confirm password" autocomplete="new-password"/>
          <button class="eye-btn" type="button" onclick="toggleEye('r-pass2',this)">👁</button>
        </div>

        <div class="chk-wrap">
          <input class="chk" type="checkbox" id="r-terms"/>
          <label for="r-terms" style="color:rgba(255,255,255,0.45);font-size:12px;line-height:1.5;cursor:pointer;">
            I agree to the <span class="lnk">Terms of Service</span> and <span class="lnk">Privacy Policy</span>
          </label>
        </div>
        <div class="chk-wrap" style="margin-bottom:6px;">
          <input class="chk" type="checkbox" id="r-news" checked/>
          <label for="r-news" style="color:rgba(255,255,255,0.35);font-size:12px;line-height:1.5;cursor:pointer;">
            Send me mood & music recommendations by email
          </label>
        </div>

        <button class="rbtn" onclick="doRegister()">Create account →</button>
        <div id="r-msg" class="msg err"></div>

        <div class="divider"><span>or sign up with</span></div>

        <button class="sbtn" onclick="socialLogin('Google')">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>
        <button class="sbtn" onclick="socialLogin('Apple')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          Continue with Apple
        </button>

        <p style="text-align:center;color:rgba(255,255,255,0.3);font-size:12px;margin-top:18px;">
          Already have an account? <span class="lnk" onclick="switchTab('login')">Sign in</span>
        </p>
      </div>

      <!-- ══ FORGOT PASSWORD ══ -->
      <div id="forgot-view">
        <div style="text-align:center;margin-bottom:20px;">
          <div style="font-size:32px;margin-bottom:8px;">🔑</div>
          <p style="color:#fff;font-weight:600;font-size:16px;">Reset your password</p>
          <p style="color:rgba(255,255,255,0.4);font-size:12px;margin-top:4px;">Enter your email and we'll send a reset link</p>
        </div>
        <div class="inp-wrap">
          <span class="inp-icon">✉</span>
          <input class="inp" id="f-email" type="email" placeholder="Your email address"/>
        </div>
        <button class="rbtn" onclick="doForgot()">Send reset link →</button>
        <div id="f-msg" class="msg"></div>
        <p style="text-align:center;margin-top:16px;">
          <span class="lnk" style="font-size:13px;" onclick="hideForgot()">← Back to sign in</span>
        </p>
      </div>

    </div><!-- /card -->

    <!-- Wave decoration -->
    <div class="wave" id="wave-footer"></div>

  </div>
</div>

<script>
// ── Floating notes ────────────────────────────────────────────────────────────
const syms=['♩','♪','♫','♬','𝄞'];
function spawnNote(){
  const nc=document.getElementById('nc');
  const n=document.createElement('div');
  n.className='note';
  n.textContent=syms[Math.floor(Math.random()*syms.length)];
  n.style.left=Math.random()*100+'%';
  const d=9+Math.random()*10;
  n.style.animationDuration=d+'s';
  n.style.animationDelay=(Math.random()*-d)+'s';
  n.style.fontSize=(13+Math.random()*14)+'px';
  nc.appendChild(n);
  setTimeout(()=>n.remove(),(d+1)*1000);
}
setInterval(spawnNote,650);
for(let i=0;i<10;i++)spawnNote();

// ── Wave bars ─────────────────────────────────────────────────────────────────
const wf=document.getElementById('wave-footer');
for(let i=0;i<16;i++){
  const b=document.createElement('div');
  b.className='wbar';
  b.style.animationDelay=(i*0.07)+'s';
  wf.appendChild(b);
}

// ── Tab switch ────────────────────────────────────────────────────────────────
function switchTab(t){
  const isLogin=t==='login';
  document.getElementById('login-form').style.display    = isLogin?'block':'none';
  document.getElementById('register-form').style.display = isLogin?'none':'block';
  document.getElementById('forgot-view').style.display   = 'none';
  document.getElementById('auth-tabs').style.display     = 'flex';
  document.getElementById('t-login').className='tab-btn '+(isLogin?'on':'off');
  document.getElementById('t-reg').className  ='tab-btn '+(isLogin?'off':'on');
  clearMsgs();
}

function clearMsgs(){
  ['l-msg','r-msg','f-msg'].forEach(id=>{
    const el=document.getElementById(id);
    el.style.display='none'; el.textContent='';
  });
}

function showMsg(id,text,type){
  const el=document.getElementById(id);
  el.textContent=text;
  el.className='msg '+(type||'err');
  el.style.display='block';
}

// ── Eye toggle ────────────────────────────────────────────────────────────────
function toggleEye(inputId,btn){
  const inp=document.getElementById(inputId);
  const isPass=inp.type==='password';
  inp.type=isPass?'text':'password';
  btn.textContent=isPass?'🙈':'👁';
}

// ── Email validation ──────────────────────────────────────────────────────────
function checkEmail(inp){
  const ok=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(inp.value);
  inp.style.borderColor = inp.value.length>0 ? (ok?'rgba(52,211,153,0.6)':'rgba(239,68,68,0.5)') : 'rgba(255,255,255,0.14)';
}

// ── Password strength ─────────────────────────────────────────────────────────
const strColors=['#ef4444','#f97316','#eab308','#22c55e'];
const strLabels=['Weak','Fair','Good','Strong'];
function checkStrength(v){
  let score=0;
  if(v.length>=8) score++;
  if(/[A-Z]/.test(v)&&/[a-z]/.test(v)) score++;
  if(/\d/.test(v)) score++;
  if(/[^A-Za-z0-9]/.test(v)) score++;
  for(let i=1;i<=4;i++){
    const s=document.getElementById('s'+i);
    s.style.background = i<=score ? strColors[score-1] : 'rgba(255,255,255,0.1)';
  }
  document.getElementById('str-label').textContent = v.length>0?(strLabels[score-1]||''):'';
  document.getElementById('str-label').style.color  = v.length>0?(strColors[score-1]||'transparent'):'transparent';
}

// ── Forgot ────────────────────────────────────────────────────────────────────
function showForgot(){
  document.getElementById('login-form').style.display='none';
  document.getElementById('auth-tabs').style.display='none';
  document.getElementById('forgot-view').style.display='block';
  clearMsgs();
}
function hideForgot(){
  document.getElementById('forgot-view').style.display='none';
  document.getElementById('login-form').style.display='block';
  document.getElementById('auth-tabs').style.display='flex';
  clearMsgs();
}
function doForgot(){
  const email=document.getElementById('f-email').value.trim();
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    showMsg('f-msg','Please enter a valid email address.','err'); return;
  }
  const m=document.getElementById('f-msg');
  m.textContent='✓ Reset link sent to '+email;
  m.className='msg ok'; m.style.display='block';
  setTimeout(hideForgot,3000);
}

// ── Social login ──────────────────────────────────────────────────────────────
function socialLogin(provider){
  const btn=event.currentTarget;
  btn.textContent='Connecting to '+provider+'...';
  btn.disabled=true;
  setTimeout(()=>{
    // In real app: redirect to OAuth flow
    alert('In production: redirect to '+provider+' OAuth.\nFor Flask: use flask-dance or authlib.');
    btn.disabled=false;
    btn.innerHTML = provider==='Google'

}

// ── Login ─────────────────────────────────────────────────────────────────────
function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pass =document.getElementById('l-pass').value;
  if(!email){showMsg('l-msg','Please enter your email address.','err');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showMsg('l-msg','Please enter a valid email address.','err');return;}
  if(!pass){showMsg('l-msg','Please enter your password.','err');return;}
  if(pass.length<6){showMsg('l-msg','Password must be at least 6 characters.','err');return;}
  showMsg('l-msg','✓ Signing you in…','ok');
  setTimeout(()=>{
    // In real app: POST to /api/login
    alert('Success! In production this redirects to the main dashboard.\nConnect to Flask /api/login endpoint.');
  },1000);
}

// ── Register ──────────────────────────────────────────────────────────────────
function doRegister(){
  const fname =document.getElementById('r-fname').value.trim();
  const lname =document.getElementById('r-lname').value.trim();
  const email =document.getElementById('r-email').value.trim();
  const pass  =document.getElementById('r-pass').value;
  const pass2 =document.getElementById('r-pass2').value;
  const terms =document.getElementById('r-terms').checked;

  if(!fname||!lname){showMsg('r-msg','Please enter your first and last name.','err');return;}
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showMsg('r-msg','Please enter a valid email address.','err');return;}
  if(pass.length<8){showMsg('r-msg','Password must be at least 8 characters.','err');return;}
  if(pass!==pass2){showMsg('r-msg','Passwords do not match.','err');return;}
  if(!terms){showMsg('r-msg','Please accept the Terms of Service to continue.','err');return;}

  showMsg('r-msg','✓ Creating your account…','ok');
  setTimeout(()=>{
    // In real app: POST to /api/register
    alert('Account created! In production this sends a verification email\nand redirects to the dashboard.\nConnect to Flask /api/register endpoint.');
  },1000);
}

document.addEventListener('keydown',e=>{
  if(e.key!=='Enter') return;
  if(document.getElementById('login-form').style.display!=='none') doLogin();
  else if(document.getElementById('register-form').style.display!=='none') doRegister();
  else if(document.getElementById('forgot-view').style.display!=='none') doForgot();
});
</script>
